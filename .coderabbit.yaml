# .coderabbit.yaml
language: ja-JP
tone_instructions: "Be concise and direct."
enable_free_tier: true

reviews:
  profile: "assertive"
  request_changes_workflow: false
  review_status: true
  commit_status: true
  assess_linked_issues: true
  auto_review:
    enabled: true
    drafts: false
  path_instructions:
    - path: "**/*"
      instructions: |
        すべてのレビュー指摘には温度感ラベルを付与すること:
        - [must]: 修正必須。バグ、セキュリティ、設計違反
        - [imo]: 意見。改善提案だが必須ではない
        - [nits]: 些細な指摘。スタイル、命名等
        - [question]: 質問。意図や背景の確認
    - path: ".claude/rules/**"
      instructions: |
        AI コーディングアシスタント用のルールファイル。

        ■ ルールに書くべき内容（AIがコードを読んでもわからないこと）:
        - 配置の制約（「ここに置くな」「ここに置け」）
        - 構造上の意図的な役割（dispatcher-only 等）
        - レイヤ間の依存方向（コンパイルは通るが設計上は禁止）

        ■ ルールに書くべきでない内容（AIがコードを読めばわかること）:
        - ディレクトリツリーの列挙
        - ファイルの中身の要約（関数名、API一覧等）
        - コードから自明なパターンの記述

        ■ レビュー観点:
        1. 追加された内容が上記「書くべき内容」に該当するか
        2. 原則に「なぜ」が書かれているか（理由が自明でない場合）
        3. 他のルールファイルとの重複がないか（相互参照を使う）
        4. フロントマターの paths glob が正しいか
        5. CLAUDE.md の Available Rules テーブルとの整合性
  tools:
    gitleaks:
      enabled: true
    yamllint:
      enabled: true
    markdownlint:
      enabled: true
    clippy:
      enabled: false

chat:
  auto_reply: true

knowledge_base:
  code_guidelines:
    enabled: true
    filePatterns:
      - ".claude/rules/*"
  learnings:
    scope: auto
  issues:
    scope: auto
  pull_requests:
    scope: auto
